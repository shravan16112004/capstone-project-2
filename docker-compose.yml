services:

  frontend:
    build: ./frontend
    container_name: frontend-container

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build: ./backend/backend
    container_name: backend-container

    ports:
      - "8080:8080"

    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql-container

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: capstone

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
